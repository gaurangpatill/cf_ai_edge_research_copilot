name = "cf_ai_edge-research-copilot"
main = "src/worker.ts"
compatibility_date = "2025-01-15"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "edge-research-copilot"

[[durable_objects.bindings]]
name = "AGENT"
class_name = "EdgeResearchAgent"

[[migrations]]
tag = "v1"
new_classes = ["EdgeResearchAgent"]

[[workflows]]
name = "RESEARCH_WORKFLOW"
class_name = "ResearchWorkflow"

[vars]
AI_GATEWAY_ENDPOINT = ""
AI_GATEWAY_TOKEN = ""
MAX_MESSAGE_CHARS = "4000"
MAX_DOC_CHARS = "20000"
RATE_LIMIT_TOKENS = "20"
RATE_LIMIT_REFILL_PER_SEC = "0.2"

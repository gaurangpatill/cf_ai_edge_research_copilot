name = "cf-ai-edge-research-copilot-v2"
main = "src/worker.ts"
compatibility_date = "2025-01-15"

[ai]
binding = "AI"
remote = true

[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "edge-research-copilot"
remote = true

[[durable_objects.bindings]]
name = "AGENT"
class_name = "EdgeResearchAgentSqlSQLite"

[[migrations]]
tag = "v101"
new_sqlite_classes = ["EdgeResearchAgentSqlSQLite"]


[[workflows]]
name = "research-workflow-v2"
binding = "RESEARCH_WORKFLOW"
class_name = "ResearchWorkflow"

[vars]
AI_GATEWAY_ENDPOINT = ""
AI_GATEWAY_TOKEN = ""
MAX_MESSAGE_CHARS = "4000"
MAX_DOC_CHARS = "20000"
RATE_LIMIT_TOKENS = "20"
RATE_LIMIT_REFILL_PER_SEC = "0.2"
